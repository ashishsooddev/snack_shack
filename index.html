<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/media/cartoon-11551057788bw864qbup7.png" type="image/x-icon">
    <title>Home Page</title>
    <link rel="stylesheet" href="./assets/style/joint.css" media="all">
    <script type="module" src="./assets/script/script.js"></script>
</head>
    <body>
        <header class="header">
            <div class="logo-container">
                <h1 class="site-name">Snack Shack</h1>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="#">Home</a></li>
                    <li class="nav-item"><a href="#">Menu</a></li>
                    <li class="nav-item"><a href="#">About</a></li>
                    <li class="nav-item"><a href="#">Contact</a></li>
                </ul>
           </nav>
        </header>
        <main>
            <section>
                <h2>Contact Us</h2>
                <h3>DROP US A LINE AND WE'LL GET BACK TO YOU</h3>
                <div class="contact-container">
                    <div class="contact-form">
                    <form>
                        <input type="text" placeholder="Your Name" class="input-field" required>
                        <input type="email" placeholder="Your Email" class="input-field" required>
                        <textarea placeholder="Your Message" class="input-field" rows="5" required></textarea>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                    </div>

                </div>
            </section>
        </main>
    </body>
</html>
